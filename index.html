<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Çalışma Süresi PRO SIRI</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#0b1f2a,#050b14);
  color:#fff;
  padding:20px;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:460px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:26px;
  padding:26px;
  box-shadow:0 0 60px rgba(0,255,255,0.12);
}

/* SHAKE */
.shake{
  animation:shake 0.35s;
}
@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}
  75%{transform:translateX(-4px)}
  100%{transform:translateX(0)}
}

/* TITLE */
.title{
  text-align:center;
  font-size:22px;
  font-weight:800;
  text-shadow:0 0 15px cyan;
}

/* MARQUEE */
.marquee{
  overflow:hidden;
  white-space:nowrap;
  margin:10px 0 18px;
  opacity:0.7;
  font-size:13px;
}
.marquee span{
  display:inline-block;
  padding-left:100%;
  animation:scroll 12s linear infinite;
}
@keyframes scroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-100%)}
}

/* LABEL */
label{
  font-size:12px;
  opacity:0.8;
  display:block;
  margin:12px 0 6px;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06);
  color:#fff;
  font-size:15px;
  outline:none;
}

/* BUTTONS */
button{
  margin-top:10px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
}

.calc{
  background:linear-gradient(90deg,#007aff,#00d4ff);
  color:#fff;
}

.voice{
  background:rgba(255,255,255,0.08);
  color:#00eaff;
  border:1px solid rgba(0,234,255,0.4);
}

/* RESULT */
.result{
  margin-top:20px;
  text-align:center;
  font-size:28px;
  font-weight:900;
}

/* STATUS */
.status{
  text-align:center;
  font-size:12px;
  margin-top:10px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="container" id="box">

  <div class="title">🤖 AI Çalışma Süresi PRO</div>

  <div class="marquee">
    <span>🎤 Sesli giriş • 🧠 Akıllı parsing • ⏱ Saat hesaplama • 🌙 Gece vardiyası</span>
  </div>

  <label>Başlangıç</label>
  <input id="start" type="time">

  <label>Bitiş</label>
  <input id="end" type="time">

  <label>Mola (dk)</label>
  <input id="break" type="number" value="0">

  <button class="voice" onclick="startVoice()">🎤 Konuş</button>
  <button class="calc" onclick="calc()">Hesapla</button>

  <div class="status" id="status"></div>
  <div class="result" id="result"></div>

</div>

<script>

let recognition;
if(window.SpeechRecognition || window.webkitSpeechRecognition){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = "tr-TR";
}

/* 🔊 SPEAK */
function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "tr-TR";
  window.speechSynthesis.speak(u);
}

/* 🎤 VOICE */
function startVoice(){
  if(!recognition){
    alert("Tarayıcı desteklemiyor");
    return;
  }

  document.getElementById("status").innerText = "🎤 Dinleniyor...";

  recognition.start();

  recognition.onresult = (e)=>{
    const text = e.results[0][0].transcript.toLowerCase();
    document.getElementById("status").innerText = "🧠 " + text;
    parse(text);
  };
}

/* 🧠 NLP PARSER v3 */
function parse(text){

  text = text.toLowerCase();

  // mola
  let breakMin = 0;
  let b = text.match(/(\d+)\s*(saat|dk|dakika)/);
  if(b){
    breakMin = b[2].includes("saat") ? b[1]*60 : parseInt(b[1]);
  }

  function toMin(str){
    str = str.replace("buçuk","30");

    let m = str.match(/(\d{1,2})[:\.](\d{2})/);
    if(m) return +m[1]*60 + +m[2];

    m = str.match(/(\d{1,2})\s+(\d{2})/);
    if(m) return +m[1]*60 + +m[2];

    m = str.match(/(\d{1,2})/);
    if(m) return +m[1]*60;

    return null;
  }

  let start = null;
  let end = null;

  let s = text.match(/(\d{1,2}[:\.]?\s*\d{0,2}).*(başla|başladı)/);
  let e = text.match(/(\d{1,2}[:\.]?\s*\d{0,2}).*(bitti|bitir)/);

  if(s) start = toMin(s[1]);
  if(e) end = toMin(e[1]);

  if(!start || !end){
    let t = text.match(/(\d{1,2}[:\.]?\s*\d{0,2})/g);
    if(t && t.length>=2){
      start = toMin(t[0]);
      end = toMin(t[1]);
    }
  }

  if(start==null || end==null){
    document.getElementById("status").innerText="❌ anlaşılamadı";
    return;
  }

  if(text.includes("öğlen") && end < start) end += 720;
  if(text.includes("akşam") && end < 720) end += 720;
  if(text.includes("gece") && end < start) end += 1440;

  document.getElementById("start").value =
    String(Math.floor(start/60)).padStart(2,"0")+":"+String(start%60).padStart(2,"0");

  document.getElementById("end").value =
    String(Math.floor(end/60)).padStart(2,"0")+":"+String(end%60).padStart(2,"0");

  document.getElementById("break").value = breakMin;

  calc();
}

/* ⚡ CALC */
function calc(){

  const box=document.getElementById("box");
  const res=document.getElementById("result");

  let s=document.getElementById("start").value;
  let e=document.getElementById("end").value;
  let b=parseInt(document.getElementById("break").value)||0;

  if(!s||!e){
    box.classList.add("shake");
    setTimeout(()=>box.classList.remove("shake"),400);
    return;
  }

  let [sh,sm]=s.split(":").map(Number);
  let [eh,em]=e.split(":").map(Number);

  let start=sh*60+sm;
  let end=eh*60+em;

  if(end<start) end+=1440;

  let total=end-start-b;

  if(total<0){
    box.classList.add("shake");
    return;
  }

  res.innerText=`🧠 ${total} dk`;

  speak(`Hesaplandı. ${total} dakika çalışma süresi.`);
}

</script>

</body>
</html>
