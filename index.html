<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Çalışma Süresi SIRI PRO</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top,#0b1f2a,#050b14);
    color:#fff;
    padding:20px;
}

/* CONTAINER */
.container{
    width:100%;
    max-width:440px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(22px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:26px;
    padding:28px;
    box-shadow:0 0 60px rgba(0,255,255,0.12);
}

/* SHAKE */
.shake{
    animation:shake 0.35s;
}
@keyframes shake{
    0%{transform:translateX(0)}
    25%{transform:translateX(-6px)}
    50%{transform:translateX(6px)}
    75%{transform:translateX(-4px)}
    100%{transform:translateX(0)}
}

/* TITLE */
.title{
    text-align:center;
    font-size:22px;
    font-weight:800;
    text-shadow:0 0 15px cyan;
}

/* MARQUEE */
.marquee{
    overflow:hidden;
    white-space:nowrap;
    margin:10px 0 18px;
    opacity:0.7;
    font-size:13px;
}
.marquee span{
    display:inline-block;
    padding-left:100%;
    animation:scroll 12s linear infinite;
}
@keyframes scroll{
    0%{transform:translateX(0)}
    100%{transform:translateX(-100%)}
}

/* LABEL */
label{
    font-size:12px;
    opacity:0.8;
    display:block;
    margin:14px 0 6px;
}

/* INPUT */
input{
    width:100%;
    padding:14px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.06);
    color:#fff;
    font-size:15px;
    outline:none;
    transition:0.25s;
}

input:focus{
    border-color:#00c8ff;
    box-shadow:0 0 0 4px rgba(0,200,255,0.2);
}

/* BUTTONS */
button{
    margin-top:14px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
}

.calc{
    background:linear-gradient(90deg,#007aff,#00d4ff);
    color:#fff;
}

.voice{
    background:rgba(255,255,255,0.08);
    color:#00eaff;
    border:1px solid rgba(0,234,255,0.4);
}

button:active{
    transform:scale(0.97);
}

/* RESULT */
.result{
    margin-top:22px;
    text-align:center;
    font-size:28px;
    font-weight:900;
    opacity:0;
    transform:scale(0.8);
    transition:0.3s;
}
.result.show{
    opacity:1;
    transform:scale(1);
}

/* STATUS */
.status{
    text-align:center;
    font-size:12px;
    margin-top:10px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="container" id="box">

    <div class="title">🤖 AI Çalışma Süresi SIRI</div>

    <div class="marquee">
        <span>🎤 Konuşarak giriş • 🧠 AI analiz • 🔊 Sesli geri bildirim • 🌙 Gece vardiyası</span>
    </div>

    <label>Başlangıç</label>
    <input id="start" type="time">

    <label>Bitiş</label>
    <input id="end" type="time">

    <label>Mola (dk)</label>
    <input id="break" type="number" value="0">

    <button class="voice" onclick="startVoice()">🎤 Konuş</button>
    <button class="calc" onclick="calc()">Hesapla</button>

    <div class="status" id="status"></div>
    <div class="result" id="result"></div>

</div>

<script>

let recognition;

if(window.SpeechRecognition || window.webkitSpeechRecognition){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = "tr-TR";
}

/* 🔊 SPEAK */
function speak(text){
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "tr-TR";
    u.rate = 1;
    window.speechSynthesis.speak(u);
}

/* 🎤 VOICE START */
function startVoice(){
    if(!recognition){
        alert("Tarayıcı desteklemiyor");
        return;
    }

    document.getElementById("status").innerText = "🎤 Dinleniyor...";

    recognition.start();

    recognition.onresult = (e)=>{
        const text = e.results[0][0].transcript.toLowerCase();
        document.getElementById("status").innerText = "🧠: " + text;

        parse(text);
    };
}

/* 🧠 NLP ENGINE */
function parse(text){

    function timeToMin(t){
        t = t.replace("buçuk","30");
        let m = t.match(/(\d{1,2})[:\.]?(\d{0,2})/);
        if(!m) return null;
        return parseInt(m[1])*60 + (parseInt(m[2]||0));
    }

    let nums = text.match(/(\d{1,2}[:\.]?\d{0,2})/g);

    let breakMin = 0;
    let b = text.match(/(\d+)\s*(saat|dk|dakika)/);
    if(b){
        breakMin = b[2].includes("saat") ? b[1]*60 : parseInt(b[1]);
    }

    if(nums && nums.length >= 2){

        let start = timeToMin(nums[0]);
        let end = timeToMin(nums[1]);

        document.getElementById("start").value =
        String(Math.floor(start/60)).padStart(2,"0")+":"+
        String(start%60).padStart(2,"0");

        document.getElementById("end").value =
        String(Math.floor(end/60)).padStart(2,"0")+":"+
        String(end%60).padStart(2,"0");

        document.getElementById("break").value = breakMin;

        calc();
    }
}

/* ⚡ CALC */
function calc(){

    const box = document.getElementById("box");
    const result = document.getElementById("result");

    let s = document.getElementById("start").value;
    let e = document.getElementById("end").value;
    let b = parseInt(document.getElementById("break").value)||0;

    if(!s || !e){
        box.classList.add("shake");
        setTimeout(()=>box.classList.remove("shake"),400);
        return;
    }

    let [sh,sm]=s.split(":").map(Number);
    let [eh,em]=e.split(":").map(Number);

    let start = sh*60+sm;
    let end = eh*60+em;

    if(end < start) end += 1440;

    let total = end - start - b;

    if(total < 0){
        box.classList.add("shake");
        setTimeout(()=>box.classList.remove("shake"),400);
        return;
    }

    result.innerText = `🧠 ${total} dk`;
    result.classList.add("show");

    speak(`Hesaplandı. ${total} dakika çalışma süresi.`);
}

</script>

</body>
</html>
