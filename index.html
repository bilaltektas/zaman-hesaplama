<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Çalışma Süresi</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #fff;
}

/* APP */
.app {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* GLASS CONTAINER (iOS STYLE) */
.container {
    width: 100%;
    max-width: 420px;

    background: rgba(20, 20, 25, 0.55);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;

    padding: 28px;

    box-shadow: 0 0 40px rgba(0, 255, 255, 0.15);

    display: flex;
    flex-direction: column;

    overflow: hidden;
}

/* TITLE */
.ai-title {
    text-align: center;
    font-size: 22px;
    margin-bottom: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 6px cyan; }
    to { text-shadow: 0 0 18px cyan; }
}

/* MARQUEE */
.marquee {
    overflow: hidden;
    white-space: nowrap;
    margin-bottom: 18px;
}

.marquee span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 10s linear infinite;
    font-size: 13px;
    opacity: 0.75;
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

/* LABEL (iOS minimal) */
label {
    font-size: 13px;
    margin-top: 14px;
    margin-bottom: 6px;
    color: rgba(255, 255, 255, 0.75);
}

/* INPUT (APPLE STYLE) */
input {
    width: 100%;
    padding: 14px;

    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.12);

    background: rgba(255, 255, 255, 0.08);
    color: #fff;

    font-size: 16px;

    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 8px 20px rgba(0, 0, 0, 0.25);

    outline: none;

    transition: all 0.25s ease;

    font-family: inherit;
}

/* PLACEHOLDER */
input::placeholder {
    color: rgba(255, 255, 255, 0.35);
}

/* FOCUS (iOS BLUE GLOW) */
input:focus {
    border: 1px solid rgba(0, 122, 255, 0.9);
    box-shadow:
        0 0 0 4px rgba(0, 122, 255, 0.25),
        0 10px 25px rgba(0, 0, 0, 0.35);
    transform: translateY(-1px);
}

/* BUTTON (APPLE STYLE) */
button {
    margin-top: 22px;
    padding: 16px;
    width: 100%;

    border: none;
    border-radius: 16px;

    background: linear-gradient(90deg, #007aff, #00c6ff);

    color: #fff;
    font-size: 17px;
    font-weight: 600;

    cursor: pointer;

    transition: all 0.2s ease;
}

button:active {
    transform: scale(0.97);
    opacity: 0.9;
}

/* RESULT */
.result {
    margin-top: 24px;
    font-size: 30px;
    text-align: center;
    font-weight: 700;
    animation: pulse 1.4s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

/* FOOTER */
footer {
    margin-top: auto;
    padding-top: 20px;
    font-size: 12px;
    text-align: center;
    opacity: 0.5;
}
</style>
</head>

<body>

<div class="app">
    <div class="container">

        <div class="ai-title">🤖 AI Çalışma Süresi</div>

        <div class="marquee">
            <span>✨ Apple tarzı premium UI • ⚡ Yapay zeka hesaplama • 📱 Mobil uyumlu ✨</span>
        </div>

        <label>Başlangıç Saati</label>
        <input type="time" id="startTime" value="12:00">

        <label>Bitiş Saati</label>
        <input type="time" id="endTime" value="13:00">

        <label>Mola Süresi (dakika)</label>
        <input type="number" id="breakMinutes" value="10">

        <button onclick="calculate()">🚀 Hesapla</button>

        <div class="result" id="result"></div>

        <footer>© Copyright - Bilal Tektaş</footer>

    </div>
</div>

<script>
function calculate() {
    const start = document.getElementById("startTime").value;
    const end = document.getElementById("endTime").value;
    const breakMin = parseInt(document.getElementById("breakMinutes").value) || 0;

    const [sh, sm] = start.split(":").map(Number);
    const [eh, em] = end.split(":").map(Number);

    const totalStart = sh * 60 + sm;
    const totalEnd = eh * 60 + em;

    const workMinutes = totalEnd - totalStart - breakMin;

    document.getElementById("result").innerText =
        workMinutes >= 0 ? `🧠 ${workMinutes} dakika` : "⛔ Hatalı giriş";
}
</script>

</body>
</html>
