<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Çalışma Süresi</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #fff;
}

.app {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 420px;
    background: rgba(0, 0, 0, 0.65);
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 0 35px rgba(0, 255, 255, 0.4);
    display: flex;
    flex-direction: column;
}

.ai-title {
    text-align: center;
    font-size: 22px;
    margin-bottom: 10px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 6px cyan; }
    to { text-shadow: 0 0 18px cyan; }
}

.marquee {
    overflow: hidden;
    white-space: nowrap;
    margin-bottom: 12px;
}

.marquee span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 10s linear infinite;
    font-size: 13px;
    opacity: 0.85;
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

.hint {
    font-size: 12px;
    opacity: 0.7;
    text-align: center;
    margin-bottom: 10px;
    line-height: 1.4;
}

label {
    font-size: 14px;
    margin-top: 14px;
}

input {
    width: 100%;
    padding: 14px;
    margin-top: 6px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
}

button {
    margin-top: 12px;
    padding: 14px;
    width: 100%;
    border: none;
    border-radius: 16px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:active {
    transform: scale(0.97);
}

.result {
    margin-top: 24px;
    font-size: 30px;
    text-align: center;
    font-weight: bold;
    animation: pulse 1.4s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

.voice-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(0,255,255,0.4);
}

footer {
    margin-top: auto;
    padding-top: 20px;
    font-size: 12px;
    text-align: center;
    opacity: 0.6;
}

.status {
    text-align:center;
    font-size:12px;
    margin-top:8px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="app">
<div class="container">

<div class="ai-title" id="title">🤖 AI Çalışma Süresi</div>

<div class="marquee">
    <span>🎤 Sesli giriş • 🧠 Akıllı hesaplama • ⚡ Mobil uyumlu</span>
</div>

<div class="hint">
🎤 Örnek konuşma:<br>
<b>başlangıç 09:15 bitiş 12:10 mola 45</b><br>
veya<br>
<b>09:15 başladı 12:10 bitti 45 dakika mola</b>
</div>

<label>Başlangıç</label>
<input type="time" id="startTime">

<label>Bitiş</label>
<input type="time" id="endTime">

<label>Mola (dk)</label>
<input type="number" id="breakMinutes" value="0">

<button class="voice-btn" onclick="startVoice()">🎤 Sesle Söyle</button>
<button onclick="calculate()">🚀 Hesapla</button>

<div class="status" id="status"></div>
<div class="result" id="result"></div>

<footer>© Copyright - Bilal Tektaş</footer>

</div>
</div>

<script>

const recognition = window.SpeechRecognition || window.webkitSpeechRecognition
    ? new (window.SpeechRecognition || window.webkitSpeechRecognition)()
    : null;

if(recognition){
    recognition.lang = "tr-TR";
}

/* 🔊 SPEAK */
function speak(text){
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "tr-TR";
    window.speechSynthesis.speak(u);
}

/* 🎤 VOICE */
function startVoice(){

    if(!recognition){
        alert("Ses desteklenmiyor");
        return;
    }

    recognition.start();

    document.getElementById("status").innerText = "🎤 Dinleniyor...";

    recognition.onresult = (e)=>{
        let text = e.results[0][0].transcript.toLowerCase();
        document.getElementById("status").innerText = "🧠 " + text;
        parse(text);
    };
}

/* 🧠 STRICT PARSER */
function parse(text){

    text = text.toLowerCase();

    let start = null;
    let end = null;
    let breakMin = 0;

    let b = text.match(/(\d+)\s*(saat|dk|dakika)/);
    if(b){
        breakMin = b[2].includes("saat") ? b[1]*60 : parseInt(b[1]);
    }

    function toMin(t){
        t = t.replace("buçuk","30");

        let m = t.match(/(\d{1,2})[:\.]\s*(\d{2})/);
        if(m) return +m[1]*60 + +m[2];

        m = t.match(/(\d{1,2})\s+(\d{2})/);
        if(m) return +m[1]*60 + +m[2];

        m = t.match(/(\d{1,2})/);
        if(m) return +m[1]*60;

        return null;
    }

    let s = text.match(/(\d{1,2}[:\.]?\s*\d{0,2}).*(başla|başladı)/);
    let e = text.match(/(\d{1,2}[:\.]?\s*\d{0,2}).*(bitti|bitir)/);

    if(s) start = toMin(s[1]);
    if(e) end = toMin(e[1]);

    if(start===null || end===null){
        let t = text.match(/(\d{1,2}[:\.]?\s*\d{0,2})/g);
        if(t && t.length>=2){
            start = toMin(t[0]);
            end = toMin(t[1]);
        }
    }

    if(start===null || end===null){
        document.getElementById("status").innerText = "❌ Format hatalı";
        return;
    }

    if(text.includes("öğlen") && end < start) end += 720;
    if(text.includes("akşam") && end < 720) end += 720;
    if(text.includes("gece") && end < start) end += 1440;

    document.getElementById("startTime").value =
        String(Math.floor(start/60)).padStart(2,"0")+":"+String(start%60).padStart(2,"0");

    document.getElementById("endTime").value =
        String(Math.floor(end/60)).padStart(2,"0")+":"+String(end%60).padStart(2,"0");

    document.getElementById("breakMinutes").value = breakMin;

    calculate();
}

/* ⚡ CALC */
function calculate(){

    let s = document.getElementById("startTime").value;
    let e = document.getElementById("endTime").value;
    let b = parseInt(document.getElementById("breakMinutes").value)||0;

    if(!s||!e){
        document.getElementById("status").innerText = "❌ eksik veri";
        return;
    }

    let [sh,sm] = s.split(":").map(Number);
    let [eh,em] = e.split(":").map(Number);

    let start = sh*60+sm;
    let end = eh*60+em;

    if(end < start) end += 1440;

    let total = end - start - b;

    if(total < 0){
        document.getElementById("status").innerText = "❌ hata";
        return;
    }

    document.getElementById("result").innerText = `🧠 ${total} dakika`;

    document.getElementById("status").innerText = "✅ hesaplandı";

    speak("Çalışma süresi " + total + " dakika");
}

</script>

</body>
</html>
